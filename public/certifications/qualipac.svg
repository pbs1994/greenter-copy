<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Orange/red gradient background -->
  <defs>
    <linearGradient id="qualipacGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E94E1B"/>
      <stop offset="100%" style="stop-color:#C41E3A"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="100" height="100" rx="10" fill="url(#qualipacGrad)"/>
  <!-- Heat pump icon -->
  <rect x="35" y="35" width="50" height="40" rx="5" fill="white"/>
  <circle cx="60" cy="55" r="12" fill="none" stroke="#E94E1B" stroke-width="3"/>
  <!-- Fan blades -->
  <line x1="60" y1="43" x2="60" y2="50" stroke="#E94E1B" stroke-width="2"/>
  <line x1="60" y1="60" x2="60" y2="67" stroke="#E94E1B" stroke-width="2"/>
  <line x1="48" y1="55" x2="55" y2="55" stroke="#E94E1B" stroke-width="2"/>
  <line x1="65" y1="55" x2="72" y2="55" stroke="#E94E1B" stroke-width="2"/>
  <!-- Text -->
  <text x="60" y="100" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">QualiPAC</text>
</svg>
